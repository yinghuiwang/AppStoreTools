<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppStore Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-52 bg-white border-r border-gray-200 flex flex-col shrink-0">
    <div class="px-4 py-4 border-b border-gray-100">
      <span class="font-semibold text-gray-800">🍎 AppStore Tools</span>
    </div>

    <!-- App switcher -->
    <div class="px-3 py-3 border-b border-gray-100">
      <label class="text-xs text-gray-500 mb-1 block">当前 App</label>
      <select id="app-switcher"
              class="w-full text-sm border border-gray-300 rounded px-2 py-1"
              onchange="
                fetch('/api/switch-profile?profile=' + encodeURIComponent(this.value))
                  .then(() => location.reload());
              "
              name="profile">
        {% for p in profiles %}
        <option value="{{ p }}" {% if p == current_profile %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </div>

    <nav class="flex-1 px-2 py-3 space-y-1">
      <a href="/metadata" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.url.path == '/metadata' %}bg-blue-50 text-blue-700 font-medium{% endif %}">
        📋 元数据上传
      </a>
      <a href="/build" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.url.path == '/build' %}bg-blue-50 text-blue-700 font-medium{% endif %}">
        🔨 构建上传
      </a>
      <hr class="my-2 border-gray-100">
      <a href="/profiles" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.url.path == '/profiles' %}bg-blue-50 text-blue-700 font-medium{% endif %}">
        👤 App 管理
      </a>
      <a href="/settings" class="flex items-center gap-2 px-3 py-2 rounded text-sm hover:bg-gray-100 {% if request.url.path == '/settings' %}bg-blue-50 text-blue-700 font-medium{% endif %}">
        ⚙️ 设置
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto p-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
