{% extends "base.html" %}
{% block content %}
<div class="">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold tracking-tight text-obsidian-50 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--accent-glow);">
        <svg class="w-4.5 h-4.5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17 17.25 21A2.652 2.652 0 0 0 21 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 1 1-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 0 0 4.486-6.336l-3.276 3.277a3.004 3.004 0 0 1-2.25-2.25l3.276-3.276a4.5 4.5 0 0 0-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085"/></svg>
      </div>
      构建上传
    </h1>
  </div>

  <div x-data="{ step: 1, taskId: null, logs: [], status: 'idle', progress: 0, progressMsg: '', phase: 0, mode: 'full', submitting: false }">

    <!-- Step 1: 配置表单 -->
    <div x-show="step === 1">
      <form id="build-form"
            hx-post="/api/build/run"
            hx-target="#build-run-result"
            hx-swap="innerHTML"
            @htmx:after-request.camel="
              const data = JSON.parse(event.detail.xhr.responseText);
              taskId = data.task_id;
              step = 2;
              submitting = false;
              startBuildSSE(taskId);
            "
            @htmx:before-request.camel="submitting = true">

        <div class="card">
          <div class="card-body space-y-5">

            <!-- Mode -->
            <div>
              <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2.5 block">操作模式</label>
              <div class="space-y-2">
                <label class="flex items-center gap-2.5 text-sm text-obsidian-200 cursor-pointer group">
                  <input type="radio" name="mode" value="full" x-model="mode" checked class="w-4 h-4">
                  <span class="group-hover:text-obsidian-50 transition-colors duration-150">完整流程（构建 + 上传）</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-obsidian-200 cursor-pointer group">
                  <input type="radio" name="mode" value="build" x-model="mode" class="w-4 h-4">
                  <span class="group-hover:text-obsidian-50 transition-colors duration-150">仅构建</span>
                </label>
                <label class="flex items-center gap-2.5 text-sm text-obsidian-200 cursor-pointer group">
                  <input type="radio" name="mode" value="deploy" x-model="mode" class="w-4 h-4">
                  <span class="group-hover:text-obsidian-50 transition-colors duration-150">仅上传已有 IPA</span>
                </label>
              </div>
            </div>

            <!-- Xcode project -->
            <div x-show="mode !== 'deploy'">
              <label for="project-input" class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">Xcode 项目</label>
              <div class="flex gap-2">
                <input type="text" name="project" id="project-input" placeholder="自动检测"
                       class="field-input flex-1">
                <button type="button"
                        class="btn-ghost whitespace-nowrap"
                        onclick="openFileBrowser('project-input', 'dir', '')">浏览</button>
              </div>
            </div>

            <!-- Scheme -->
            <div x-show="mode !== 'deploy'">
              <label for="scheme-select" class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">Scheme</label>
              <select name="scheme" id="scheme-select" class="field-select w-full">
                <option value="">自动检测</option>
              </select>
            </div>

            <!-- Destination -->
            <div>
              <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2.5 block">目标平台</label>
              <div class="flex gap-6">
                <label class="flex items-center gap-2.5 text-sm text-obsidian-200 cursor-pointer">
                  <input type="radio" name="destination" value="testflight" checked class="w-4 h-4"> TestFlight
                </label>
                <label class="flex items-center gap-2.5 text-sm text-obsidian-200 cursor-pointer">
                  <input type="radio" name="destination" value="appstore" class="w-4 h-4"> App Store
                </label>
              </div>
            </div>

            <!-- IPA path -->
            <div x-show="mode === 'deploy'">
              <label for="ipa-path-input" class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">IPA 路径</label>
              <div class="flex gap-2">
                <input type="text" name="ipa_path" id="ipa-path-input"
                       :required="mode === 'deploy'"
                       class="field-input flex-1">
                <button type="button"
                        class="btn-ghost whitespace-nowrap"
                        onclick="openFileBrowser('ipa-path-input', 'file', '.ipa')">浏览</button>
              </div>
            </div>

            <!-- Verbose -->
            <div>
              <label class="flex items-center gap-2.5 text-sm text-obsidian-300 cursor-pointer">
                <input type="checkbox" name="verbose" value="on" class="w-4 h-4"> Verbose（实时显示原始日志）
              </label>
            </div>

            <!-- Actions -->
            <div class="pt-3 border-t border-obsidian-700">
              <button type="submit"
                      class="btn-primary"
                      :disabled="submitting">
                <span x-show="!submitting">开始</span>
                <span x-show="submitting" class="flex items-center gap-1.5">
                  <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                  提交中...
                </span>
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <!-- Step 2: 执行面板 -->
    <div x-show="step === 2" class="">
      <div class="card">
        <div class="card-body">
          <div class="flex items-center justify-between mb-5">
            <h2 class="font-semibold text-obsidian-100" x-text="status === 'done' ? '完成' : status === 'error' ? '失败' : '执行中...'"></h2>
            <button type="button" class="text-xs text-amber-550 hover:text-amber-500 cursor-pointer transition-colors duration-150 font-medium" @click="step=1; logs=[]; status='idle'; phase=0">重新运行</button>
          </div>

          <!-- Phase indicator - instrument gauges -->
          <div class="flex items-center gap-1 mb-5 p-3 rounded-lg" style="background: var(--bg-base);">
            <div class="flex-1 flex items-center gap-2 px-3 py-2 rounded-md transition-all duration-300"
                 :class="phase >= 1 ? 'bg-amber-500/10' : ''"
                 :style="phase >= 1 ? 'box-shadow: inset 0 0 0 1px rgba(232,161,37,0.2)' : ''">
              <div class="w-5 h-5 rounded-full flex items-center justify-center transition-colors duration-300"
                   :class="phase >= 1 ? 'bg-amber-500/20' : 'bg-obsidian-700'">
                <svg class="w-3 h-3 transition-colors duration-300" :class="phase >= 1 ? 'text-amber-500' : 'text-obsidian-500'" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0-3-3m3 3 3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/></svg>
              </div>
              <span class="text-xs font-medium transition-colors duration-300" :class="phase >= 1 ? 'text-amber-500' : 'text-obsidian-500'">归档</span>
            </div>
            <svg class="w-4 h-4 text-obsidian-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
            <div class="flex-1 flex items-center gap-2 px-3 py-2 rounded-md transition-all duration-300"
                 :class="phase >= 2 ? 'bg-amber-500/10' : ''"
                 :style="phase >= 2 ? 'box-shadow: inset 0 0 0 1px rgba(232,161,37,0.2)' : ''">
              <div class="w-5 h-5 rounded-full flex items-center justify-center transition-colors duration-300"
                   :class="phase >= 2 ? 'bg-amber-500/20' : 'bg-obsidian-700'">
                <svg class="w-3 h-3 transition-colors duration-300" :class="phase >= 2 ? 'text-amber-500' : 'text-obsidian-500'" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
              </div>
              <span class="text-xs font-medium transition-colors duration-300" :class="phase >= 2 ? 'text-amber-500' : 'text-obsidian-500'">导出</span>
            </div>
            <svg class="w-4 h-4 text-obsidian-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
            <div class="flex-1 flex items-center gap-2 px-3 py-2 rounded-md transition-all duration-300"
                 :class="phase >= 3 ? 'bg-amber-500/10' : ''"
                 :style="phase >= 3 ? 'box-shadow: inset 0 0 0 1px rgba(232,161,37,0.2)' : ''">
              <div class="w-5 h-5 rounded-full flex items-center justify-center transition-colors duration-300"
                   :class="phase >= 3 ? 'bg-amber-500/20' : 'bg-obsidian-700'">
                <svg class="w-3 h-3 transition-colors duration-300" :class="phase >= 3 ? 'text-amber-500' : 'text-obsidian-500'" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/></svg>
              </div>
              <span class="text-xs font-medium transition-colors duration-300" :class="phase >= 3 ? 'text-amber-500' : 'text-obsidian-500'">上传</span>
            </div>
          </div>

          <!-- Progress -->
          <div class="progress-track mb-2">
            <div class="progress-fill" :style="`width: ${progress}%`"></div>
          </div>
          <div class="flex items-center justify-between mb-5">
            <p class="text-xs text-obsidian-400" x-text="progressMsg"></p>
            <span class="text-xs font-mono text-obsidian-500 tabular-nums" x-text="progress > 0 ? progress + '%' : ''"></span>
          </div>

          <!-- Log toggle -->
          <div x-data="{ open: true }">
            <button type="button" class="text-xs text-obsidian-400 hover:text-obsidian-200 cursor-pointer transition-colors duration-150 flex items-center gap-1.5 uppercase tracking-wider font-medium" @click="open = !open">
              <svg class="w-3 h-3 transition-transform duration-150" :class="open ? 'rotate-0' : '-rotate-90'" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
              <span x-text="open ? '收起日志' : '展开日志'"></span>
            </button>
            <div x-show="open" x-transition.duration.150ms class="mt-2 log-panel max-h-64" id="build-log-panel">
              <template x-for="(line, idx) in logs" :key="idx">
                <div x-text="line"></div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="build-run-result"></div>
  </div>
</div>

<!-- File browser modal -->
<div id="filebrowser-modal" class="hidden fixed inset-0 flex items-center justify-center z-50" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);">
  <div class="card w-[420px]">
    <div class="card-header flex items-center justify-between">
      <h3 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">选择路径</h3>
      <button onclick="closeFileBrowser()" class="text-obsidian-500 hover:text-obsidian-300 cursor-pointer transition-colors duration-150 p-1 rounded focus-ring">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="filebrowser-content" class="card-body"></div>
    <div class="px-5 py-3 border-t border-obsidian-700 flex justify-end">
      <button onclick="closeFileBrowser()" class="btn-ghost">取消</button>
    </div>
  </div>
</div>

<script>
const _BUILD_STORE_KEY = 'asc_build_form_{{ current_profile }}';

function _saveBuildForm() {
  const f = document.getElementById('build-form');
  if (!f) return;
  const data = {
    mode: f.querySelector('[name=mode]:checked')?.value || 'full',
    project: f.querySelector('[name=project]').value,
    destination: f.querySelector('[name=destination]:checked')?.value || 'testflight',
    ipa_path: f.querySelector('[name=ipa_path]').value,
    verbose: f.querySelector('[name=verbose]').checked,
  };
  localStorage.setItem(_BUILD_STORE_KEY, JSON.stringify(data));
}

function _restoreBuildForm() {
  const raw = localStorage.getItem(_BUILD_STORE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    const f = document.getElementById('build-form');
    if (!f) return;
    if (data.mode) {
      const r = f.querySelector(`[name=mode][value="${data.mode}"]`);
      if (r) { r.checked = true; r.dispatchEvent(new Event('change')); }
    }
    if (data.project) f.querySelector('[name=project]').value = data.project;
    if (data.destination) {
      const r = f.querySelector(`[name=destination][value="${data.destination}"]`);
      if (r) r.checked = true;
    }
    if (data.ipa_path) f.querySelector('[name=ipa_path]').value = data.ipa_path;
    f.querySelector('[name=verbose]').checked = !!data.verbose;
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  _restoreBuildForm();
  const f = document.getElementById('build-form');
  if (f) {
    f.addEventListener('change', _saveBuildForm);
    f.addEventListener('input', _saveBuildForm);
    f.addEventListener('submit', _saveBuildForm);
  }
});

let _fbTargetInput = null, _fbMode = 'dir', _fbExt = '';
function openFileBrowser(inputId, mode, ext) {
  _fbTargetInput = inputId; _fbMode = mode; _fbExt = ext;
  document.getElementById('filebrowser-modal').classList.remove('hidden');
  const val = document.getElementById(inputId).value || '.';
  htmx.ajax('GET', `/api/browse?path=${encodeURIComponent(val)}&mode=${mode}&ext=${ext}`, {target: '#filebrowser-content', swap: 'innerHTML'});
}
function closeFileBrowser() { document.getElementById('filebrowser-modal').classList.add('hidden'); }
function selectFile(path) {
  if (_fbTargetInput) {
    const el = document.getElementById(_fbTargetInput);
    el.value = path;
    el.dispatchEvent(new Event('input', { bubbles: true }));
  }
  closeFileBrowser();
}

function startBuildSSE(taskId) {
  const root = document.querySelector('[x-data]');
  const d = Alpine.$data(root);
  const es = new EventSource(`/api/task/${taskId}/stream`);
  es.addEventListener('log', e => {
    d.logs.push(e.data);
    if (e.data.includes('archive') || e.data.includes('归档')) d.phase = Math.max(d.phase, 1);
    if (e.data.includes('export') || e.data.includes('导出')) d.phase = Math.max(d.phase, 2);
    if (e.data.includes('upload') || e.data.includes('上传')) d.phase = Math.max(d.phase, 3);
    const panel = document.getElementById('build-log-panel');
    if (panel) requestAnimationFrame(() => { panel.scrollTop = panel.scrollHeight; });
  });
  es.addEventListener('progress', e => { const p = JSON.parse(e.data); d.progress = p.pct || 0; d.progressMsg = p.msg || ''; });
  es.addEventListener('done', () => { d.status = 'done'; d.progress = 100; d.phase = 3; es.close(); });
  es.addEventListener('error_event', () => { d.status = 'error'; es.close(); });
}
</script>
{% endblock %}
