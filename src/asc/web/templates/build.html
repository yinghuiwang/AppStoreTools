{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-semibold mb-6">🔨 构建上传</h1>

<div x-data="{ step: 1, taskId: null, logs: [], status: 'idle', progress: 0, progressMsg: '', phase: 0, mode: 'full' }">

  <!-- Step 1: 配置表单 -->
  <div x-show="step === 1">
    <form id="build-form"
          hx-post="/api/build/run"
          hx-target="#build-run-result"
          hx-swap="innerHTML"
          @htmx:after-request.camel="
            const data = JSON.parse(event.detail.xhr.responseText);
            taskId = data.task_id;
            step = 2;
            startBuildSSE(taskId);
          ">

      <div class="bg-white rounded-lg border border-gray-200 p-5 space-y-4 max-w-xl">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">操作模式</label>
          <div class="space-y-1">
            <label class="flex items-center gap-2 text-sm">
              <input type="radio" name="mode" value="full" x-model="mode" checked> 完整流程（构建 + 上传）
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input type="radio" name="mode" value="build" x-model="mode"> 仅构建
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input type="radio" name="mode" value="deploy" x-model="mode"> 仅上传已有 IPA
            </label>
          </div>
        </div>

        <div x-show="mode !== 'deploy'">
          <label class="block text-sm font-medium text-gray-700 mb-1">Xcode 项目</label>
          <div class="flex gap-2">
            <input type="text" name="project" id="project-input" placeholder="自动检测"
                   class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm font-mono">
            <button type="button"
                    class="px-3 py-2 text-sm border border-gray-300 rounded hover:bg-gray-50"
                    onclick="openFileBrowser('project-input', 'dir', '')">浏览</button>
          </div>
        </div>

        <div x-show="mode !== 'deploy'">
          <label class="block text-sm font-medium text-gray-700 mb-1">Scheme</label>
          <select name="scheme" class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
            <option value="">自动检测</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">目标平台</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 text-sm">
              <input type="radio" name="destination" value="testflight" checked> TestFlight
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input type="radio" name="destination" value="appstore"> App Store
            </label>
          </div>
        </div>

        <div x-show="mode === 'deploy'">
          <label class="block text-sm font-medium text-gray-700 mb-1">IPA 路径</label>
          <div class="flex gap-2">
            <input type="text" name="ipa_path" id="ipa-path-input"
                   :required="mode === 'deploy'"
                   class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm font-mono">
            <button type="button"
                    class="px-3 py-2 text-sm border border-gray-300 rounded hover:bg-gray-50"
                    onclick="openFileBrowser('ipa-path-input', 'file', '.ipa')">浏览</button>
          </div>
        </div>

        <div>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" name="verbose" value="on"> Verbose（实时显示原始日志）
          </label>
        </div>

        <div class="pt-2">
          <button type="submit"
                  class="px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
            开始
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- Step 2: 执行面板 -->
  <div x-show="step === 2" class="max-w-xl">
    <div class="bg-white rounded-lg border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-medium" x-text="status === 'done' ? '✅ 完成' : status === 'error' ? '❌ 失败' : '⏳ 执行中...'"></h2>
        <button type="button" class="text-sm text-blue-600 hover:underline" @click="step=1; logs=[]; status='idle'; phase=0">重新运行</button>
      </div>

      <!-- Phase indicator -->
      <div class="flex items-center gap-2 mb-4 text-sm">
        <span :class="phase >= 1 ? 'text-blue-600 font-medium' : 'text-gray-400'">归档</span>
        <span class="text-gray-300">──</span>
        <span :class="phase >= 2 ? 'text-blue-600 font-medium' : 'text-gray-400'">导出</span>
        <span class="text-gray-300">──</span>
        <span :class="phase >= 3 ? 'text-blue-600 font-medium' : 'text-gray-400'">上传</span>
      </div>

      <div class="w-full bg-gray-100 rounded-full h-2 mb-2">
        <div class="bg-blue-500 h-2 rounded-full transition-all" :style="`width: ${progress}%`"></div>
      </div>
      <p class="text-xs text-gray-500 mb-4" x-text="progressMsg"></p>

      <div x-data="{ open: true }">
        <button type="button" class="text-sm text-gray-600 hover:underline" @click="open = !open">
          <span x-text="open ? '▼ 收起日志' : '▶ 展开日志'"></span>
        </button>
        <div x-show="open" class="mt-2 bg-gray-900 text-green-400 text-xs font-mono rounded p-3 max-h-64 overflow-y-auto" id="build-log-panel">
          <template x-for="(line, idx) in logs" :key="idx">
            <div x-text="line"></div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <div id="build-run-result"></div>
</div>

<!-- File browser modal -->
<div id="filebrowser-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-96 p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-medium text-sm">选择路径</h3>
      <button onclick="closeFileBrowser()" class="text-gray-400 hover:text-gray-600">✕</button>
    </div>
    <div id="filebrowser-content"></div>
    <div class="mt-3 flex justify-end">
      <button onclick="closeFileBrowser()" class="px-3 py-1.5 text-sm border border-gray-300 rounded hover:bg-gray-50">取消</button>
    </div>
  </div>
</div>

<script>
const _BUILD_STORE_KEY = 'asc_build_form_{{ current_profile }}';

function _saveBuildForm() {
  const f = document.getElementById('build-form');
  if (!f) return;
  const data = {
    mode: f.querySelector('[name=mode]:checked')?.value || 'full',
    project: f.querySelector('[name=project]').value,
    destination: f.querySelector('[name=destination]:checked')?.value || 'testflight',
    ipa_path: f.querySelector('[name=ipa_path]').value,
    verbose: f.querySelector('[name=verbose]').checked,
  };
  localStorage.setItem(_BUILD_STORE_KEY, JSON.stringify(data));
}

function _restoreBuildForm() {
  const raw = localStorage.getItem(_BUILD_STORE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    const f = document.getElementById('build-form');
    if (!f) return;
    if (data.mode) {
      const r = f.querySelector(`[name=mode][value="${data.mode}"]`);
      if (r) { r.checked = true; r.dispatchEvent(new Event('change')); }
    }
    if (data.project) f.querySelector('[name=project]').value = data.project;
    if (data.destination) {
      const r = f.querySelector(`[name=destination][value="${data.destination}"]`);
      if (r) r.checked = true;
    }
    if (data.ipa_path) f.querySelector('[name=ipa_path]').value = data.ipa_path;
    f.querySelector('[name=verbose]').checked = !!data.verbose;
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  _restoreBuildForm();
  const f = document.getElementById('build-form');
  if (f) {
    f.addEventListener('change', _saveBuildForm);
    f.addEventListener('input', _saveBuildForm);
    f.addEventListener('submit', _saveBuildForm);
  }
});

let _fbTargetInput = null, _fbMode = 'dir', _fbExt = '';
function openFileBrowser(inputId, mode, ext) {
  _fbTargetInput = inputId; _fbMode = mode; _fbExt = ext;
  document.getElementById('filebrowser-modal').classList.remove('hidden');
  const val = document.getElementById(inputId).value || '.';
  htmx.ajax('GET', `/api/browse?path=${encodeURIComponent(val)}&mode=${mode}&ext=${ext}`, {target: '#filebrowser-content', swap: 'innerHTML'});
}
function closeFileBrowser() { document.getElementById('filebrowser-modal').classList.add('hidden'); }
function selectFile(path) {
  if (_fbTargetInput) {
    const el = document.getElementById(_fbTargetInput);
    el.value = path;
    el.dispatchEvent(new Event('input', { bubbles: true }));
  }
  closeFileBrowser();
}

function startBuildSSE(taskId) {
  const root = document.querySelector('[x-data]');
  const d = Alpine.$data(root);
  const es = new EventSource(`/api/task/${taskId}/stream`);
  es.addEventListener('log', e => {
    d.logs.push(e.data);
    if (e.data.includes('archive') || e.data.includes('归档')) d.phase = Math.max(d.phase, 1);
    if (e.data.includes('export') || e.data.includes('导出')) d.phase = Math.max(d.phase, 2);
    if (e.data.includes('upload') || e.data.includes('上传')) d.phase = Math.max(d.phase, 3);
    const panel = document.getElementById('build-log-panel');
    if (panel) requestAnimationFrame(() => { panel.scrollTop = panel.scrollHeight; });
  });
  es.addEventListener('progress', e => { const p = JSON.parse(e.data); d.progress = p.pct || 0; d.progressMsg = p.msg || ''; });
  es.addEventListener('done', () => { d.status = 'done'; d.progress = 100; d.phase = 3; es.close(); });
  es.addEventListener('error_event', () => { d.status = 'error'; es.close(); });
}
</script>
{% endblock %}
