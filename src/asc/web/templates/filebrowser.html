<div class="flex items-center justify-between mb-2">
  <span class="text-xs text-gray-500 font-mono truncate">{{ current_path }}</span>
  {% if mode == "dir" %}
  <button type="button"
          class="ml-2 shrink-0 px-2 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700"
          onclick="selectFile('{{ current_path }}')">选择此目录</button>
  {% endif %}
</div>
<ul class="divide-y divide-gray-100 max-h-64 overflow-y-auto">
  {% for entry in entries %}
  <li>
    {% if entry.is_dir %}
    <button type="button"
            class="w-full text-left px-3 py-1.5 hover:bg-gray-50 text-sm flex items-center gap-2"
            hx-get="/api/browse?path={{ entry.path }}&mode={{ mode }}&ext={{ ext }}"
            hx-target="#filebrowser-content"
            hx-swap="innerHTML">
      📁 {{ entry.name }}
    </button>
    {% else %}
    <button type="button"
            class="w-full text-left px-3 py-1.5 hover:bg-blue-50 text-sm flex items-center gap-2"
            onclick="selectFile('{{ entry.path }}')">
      📄 {{ entry.name }}
    </button>
    {% endif %}
  </li>
  {% endfor %}
</ul>
