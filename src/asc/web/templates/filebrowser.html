<div class="flex items-center justify-between mb-3">
  <span class="text-[11px] text-obsidian-400 font-mono truncate">{{ current_path }}</span>
  {% if mode == "dir" %}
  <button type="button"
          class="ml-2 shrink-0 px-3 py-1 text-[11px] font-medium rounded-md cursor-pointer transition-colors duration-150"
          style="background: var(--accent); color: var(--bg-base);"
          onclick="selectFile('{{ current_path }}')">选择此目录</button>
  {% endif %}
</div>
<ul class="divide-y divide-obsidian-700 max-h-64 overflow-y-auto">
  {% for entry in entries %}
  <li>
    {% if entry.is_dir %}
    <button type="button"
            class="w-full text-left px-3 py-2 hover:bg-obsidian-800/60 text-sm flex items-center gap-2.5 transition-colors duration-100 cursor-pointer text-obsidian-300"
            hx-get="/api/browse?path={{ entry.path }}&mode={{ mode }}&ext={{ ext }}"
            hx-target="#filebrowser-content"
            hx-swap="innerHTML">
      <svg class="w-4 h-4 text-amber-550 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9M12.75 3v5.25"/></svg>
      {{ entry.name }}
    </button>
    {% else %}
    <button type="button"
            class="w-full text-left px-3 py-2 hover:bg-obsidian-800/60 text-sm flex items-center gap-2.5 transition-colors duration-100 cursor-pointer text-obsidian-300"
            onclick="selectFile('{{ entry.path }}')">
      <svg class="w-4 h-4 text-obsidian-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
      {{ entry.name }}
    </button>
    {% endif %}
  </li>
  {% endfor %}
</ul>
