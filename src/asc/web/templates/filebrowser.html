<div class="text-xs text-gray-500 mb-2 font-mono truncate">{{ current_path }}</div>
<ul class="divide-y divide-gray-100 max-h-64 overflow-y-auto">
  {% for entry in entries %}
  <li>
    {% if entry.is_dir %}
    <button type="button"
            class="w-full text-left px-3 py-1.5 hover:bg-gray-50 text-sm flex items-center gap-2"
            hx-get="/api/browse?path={{ entry.path }}&mode={{ mode }}&ext={{ ext }}"
            hx-target="#filebrowser-content"
            hx-swap="innerHTML">
      📁 {{ entry.name }}
    </button>
    {% else %}
    <button type="button"
            class="w-full text-left px-3 py-1.5 hover:bg-blue-50 text-sm flex items-center gap-2"
            onclick="selectFile('{{ entry.path }}')">
      📄 {{ entry.name }}
    </button>
    {% endif %}
  </li>
  {% endfor %}
</ul>
