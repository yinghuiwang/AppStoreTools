{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-semibold mb-4">仪表盘</h1>
<p class="text-gray-500">当前 App：<strong>{{ current_profile or "未配置" }}</strong></p>
{% if recent_tasks %}
<div class="mt-6">
  <h2 class="text-sm font-medium text-gray-700 mb-2">最近操作</h2>
  <ul class="space-y-1">
    {% for t in recent_tasks %}
    <li class="text-sm text-gray-600">{{ t.kind }} — {{ t.status }} — {{ t.created_at[:19] }}</li>
    {% endfor %}
  </ul>
</div>
{% endif %}
{% endblock %}
