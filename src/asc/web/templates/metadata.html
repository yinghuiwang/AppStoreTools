{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-semibold mb-6 flex items-center gap-2">
  <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
  元数据上传
</h1>

<div x-data="{ step: 1, taskId: null, logs: [], status: 'idle', progress: 0, progressMsg: '', checkResult: null, submitting: false }">

  <!-- Step 1: 配置表单 -->
  <div x-show="step === 1">
    <form id="metadata-form"
          hx-post="/api/metadata/run"
          hx-target="#run-result"
          hx-swap="innerHTML"
          @htmx:after-request.camel="
            const data = JSON.parse(event.detail.xhr.responseText);
            taskId = data.task_id;
            step = 2;
            submitting = false;
            startSSE(taskId);
          "
          @htmx:before-request.camel="submitting = true">

      <div class="bg-white rounded-lg border border-gray-200 p-5 space-y-4 max-w-xl">

        <div>
          <label for="csv-path-input" class="block text-sm font-medium text-gray-700 mb-1">CSV 文件路径</label>
          <div class="flex gap-2">
            <input type="text" name="csv_path" value="{{ profile_csv }}"
                   id="csv-path-input"
                   class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus-ring transition-colors duration-150 focus:border-blue-500">
            <button type="button"
                    class="px-3 py-2 text-sm border border-gray-300 rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring"
                    onclick="openFileBrowser('csv-path-input', 'file', '.csv')">浏览</button>
          </div>
        </div>

        <div>
          <label for="screenshots-dir-input" class="block text-sm font-medium text-gray-700 mb-1">截图目录</label>
          <div class="flex gap-2">
            <input type="text" name="screenshots_dir" value="{{ profile_screenshots }}"
                   id="screenshots-dir-input"
                   class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus-ring transition-colors duration-150 focus:border-blue-500">
            <button type="button"
                    class="px-3 py-2 text-sm border border-gray-300 rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring"
                    onclick="openFileBrowser('screenshots-dir-input', 'dir', '')">浏览</button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">上传范围</label>
          <div class="space-y-1">
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" name="include_metadata" value="on" checked class="rounded text-blue-600 cursor-pointer"> 元数据
            </label>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" name="include_screenshots" value="on" checked class="rounded text-blue-600 cursor-pointer"> 截图
            </label>
          </div>
        </div>

        <div>
          <label class="flex items-center gap-2 text-sm cursor-pointer">
            <input type="checkbox" name="dry_run" value="on" class="rounded text-blue-600 cursor-pointer"> Dry Run（预览，不实际上传）
          </label>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 cursor-pointer transition-colors duration-150 focus-ring disabled:opacity-50 disabled:cursor-not-allowed"
                  :disabled="submitting">
            <span x-show="!submitting">开始上传</span>
            <span x-show="submitting" class="flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              提交中...
            </span>
          </button>
          <button type="button"
                  class="px-4 py-2 border border-gray-300 text-sm rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring"
                  @click="
                    fetch('/api/metadata/check', {method: 'POST', headers: {'Content-Type': 'application/x-www-form-urlencoded'}})
                      .then(r => r.json())
                      .then(data => { checkResult = data; })
                      .catch(() => { checkResult = {ok: false, level: 'error', message: '请求失败'}; })
                  ">
            验证环境
          </button>
        </div>

        <template x-if="checkResult">
          <div class="mt-3 rounded-lg p-4 text-sm"
               :class="{
                 'bg-green-50 text-green-800 border border-green-200': checkResult.level === 'success',
                 'bg-yellow-50 text-yellow-800 border border-yellow-200': checkResult.level === 'warning',
                 'bg-red-50 text-red-800 border border-red-200': checkResult.level === 'error',
               }">
            <p class="font-medium" x-text="checkResult.message"></p>
            <template x-if="checkResult.detail && checkResult.detail.version">
              <p class="text-xs mt-1 opacity-80"
                 x-text="'版本 ' + checkResult.detail.version + ' · 状态 ' + checkResult.detail.state"></p>
            </template>
          </div>
        </template>
      </div>
    </form>
  </div>

  <!-- Step 2: 执行面板 -->
  <div x-show="step === 2" class="max-w-xl">
    <div class="bg-white rounded-lg border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-medium flex items-center gap-2" x-text="status === 'done' ? '上传完成' : status === 'error' ? '上传失败' : '上传中...'">
        </h2>
        <div class="flex items-center gap-2">
          <template x-if="status === 'done'">
            <svg class="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
          </template>
          <template x-if="status === 'error'">
            <svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>
          </template>
          <template x-if="status === 'idle' || status === 'running'">
            <svg x-show="status === 'running'" class="w-5 h-5 text-blue-500 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          </template>
        </div>
        <button type="button" class="text-sm text-blue-600 hover:text-blue-800 cursor-pointer transition-colors duration-150" @click="step=1; logs=[]; status='idle'">重新运行</button>
      </div>

      <div class="w-full bg-gray-100 rounded-full h-2 mb-2 relative overflow-hidden">
        <div class="bg-blue-500 h-2 rounded-full transition-all duration-300 ease-out" :style="`width: ${progress}%`"></div>
      </div>
      <div class="flex items-center justify-between mb-4">
        <p class="text-xs text-gray-500" x-text="progressMsg"></p>
        <span class="text-xs font-mono text-gray-400" x-text="progress > 0 ? progress + '%' : ''"></span>
      </div>

      <div x-data="{ open: true }">
        <button type="button" class="text-sm text-gray-600 hover:text-gray-800 cursor-pointer transition-colors duration-150 flex items-center gap-1" @click="open = !open">
          <svg class="w-3.5 h-3.5 transition-transform duration-150" :class="open ? 'rotate-0' : '-rotate-90'" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
          <span x-text="open ? '收起日志' : '展开日志'"></span>
        </button>
        <div x-show="open" x-transition.duration.150ms class="mt-2 bg-gray-900 text-green-400 text-xs font-mono rounded-md p-3 max-h-64 overflow-y-auto" id="log-panel">
          <template x-for="(line, idx) in logs" :key="idx">
            <div x-text="line"></div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <div id="run-result"></div>
</div>

<!-- File browser modal -->
<div id="filebrowser-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-96 p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-medium text-sm">选择路径</h3>
      <button onclick="closeFileBrowser()" class="text-gray-400 hover:text-gray-600 cursor-pointer transition-colors duration-150 p-1 rounded focus-ring">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="filebrowser-content"></div>
    <div class="mt-3 flex justify-end">
      <button onclick="closeFileBrowser()" class="px-3 py-1.5 text-sm border border-gray-300 rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring">取消</button>
    </div>
  </div>
</div>

<script>
const _METADATA_STORE_KEY = 'asc_metadata_form_{{ current_profile }}';

function _saveMetadataForm() {
  const f = document.getElementById('metadata-form');
  if (!f) return;
  const data = {
    csv_path: f.querySelector('[name=csv_path]').value,
    screenshots_dir: f.querySelector('[name=screenshots_dir]').value,
    include_metadata: f.querySelector('[name=include_metadata]').checked,
    include_screenshots: f.querySelector('[name=include_screenshots]').checked,
    dry_run: f.querySelector('[name=dry_run]').checked,
  };
  localStorage.setItem(_METADATA_STORE_KEY, JSON.stringify(data));
}

function _restoreMetadataForm() {
  const raw = localStorage.getItem(_METADATA_STORE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    const f = document.getElementById('metadata-form');
    if (!f) return;
    if (data.csv_path) f.querySelector('[name=csv_path]').value = data.csv_path;
    if (data.screenshots_dir) f.querySelector('[name=screenshots_dir]').value = data.screenshots_dir;
    f.querySelector('[name=include_metadata]').checked = data.include_metadata !== false;
    f.querySelector('[name=include_screenshots]').checked = data.include_screenshots !== false;
    f.querySelector('[name=dry_run]').checked = !!data.dry_run;
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  _restoreMetadataForm();
  const f = document.getElementById('metadata-form');
  if (f) {
    f.addEventListener('change', _saveMetadataForm);
    f.addEventListener('input', _saveMetadataForm);
    f.addEventListener('submit', _saveMetadataForm);
  }
});

let _fbTargetInput = null;
let _fbMode = 'dir';
let _fbExt = '';

function openFileBrowser(inputId, mode, ext) {
  _fbTargetInput = inputId;
  _fbMode = mode;
  _fbExt = ext;
  document.getElementById('filebrowser-modal').classList.remove('hidden');
  const currentVal = document.getElementById(inputId).value || '.';
  htmx.ajax('GET', `/api/browse?path=${encodeURIComponent(currentVal)}&mode=${mode}&ext=${ext}`, {target: '#filebrowser-content', swap: 'innerHTML'});
}

function closeFileBrowser() {
  document.getElementById('filebrowser-modal').classList.add('hidden');
}

function selectFile(path) {
  if (_fbTargetInput) {
    const el = document.getElementById(_fbTargetInput);
    el.value = path;
    el.dispatchEvent(new Event('input', { bubbles: true }));
  }
  closeFileBrowser();
}

function startSSE(taskId) {
  const root = document.querySelector('[x-data]');
  const d = Alpine.$data(root);
  const es = new EventSource(`/api/task/${taskId}/stream`);
  es.addEventListener('log', e => {
    d.logs.push(e.data);
    const panel = document.getElementById('log-panel');
    if (panel) requestAnimationFrame(() => { panel.scrollTop = panel.scrollHeight; });
  });
  es.addEventListener('progress', e => {
    const p = JSON.parse(e.data);
    d.progress = p.pct || 0;
    d.progressMsg = p.msg || '';
  });
  es.addEventListener('done', () => { d.status = 'done'; d.progress = 100; es.close(); });
  es.addEventListener('error_event', () => { d.status = 'error'; es.close(); });
}
</script>
{% endblock %}
