{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-semibold mb-6">📋 元数据上传</h1>

<div x-data="{ step: 1, taskId: null, logs: [], status: 'idle', progress: 0, progressMsg: '' }">

  <!-- Step 1: 配置表单 -->
  <div x-show="step === 1">
    <form id="metadata-form"
          hx-post="/api/metadata/run"
          hx-target="#run-result"
          hx-swap="innerHTML"
          @htmx:after-request.camel="
            const data = JSON.parse(event.detail.xhr.responseText);
            taskId = data.task_id;
            step = 2;
            startSSE(taskId);
          ">

      <div class="bg-white rounded-lg border border-gray-200 p-5 space-y-4 max-w-xl">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">App Profile</label>
          <select name="profile" class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
            {% for p in profiles %}
            <option value="{{ p }}" {% if p == current_profile %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CSV 文件路径</label>
          <div class="flex gap-2">
            <input type="text" name="csv_path" value="data/appstore_info.csv"
                   id="csv-path-input"
                   class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm font-mono">
            <button type="button"
                    class="px-3 py-2 text-sm border border-gray-300 rounded hover:bg-gray-50"
                    onclick="openFileBrowser('csv-path-input', 'file', '.csv')">浏览</button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">截图目录</label>
          <div class="flex gap-2">
            <input type="text" name="screenshots_dir" value="data/screenshots"
                   id="screenshots-dir-input"
                   class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm font-mono">
            <button type="button"
                    class="px-3 py-2 text-sm border border-gray-300 rounded hover:bg-gray-50"
                    onclick="openFileBrowser('screenshots-dir-input', 'dir', '')">浏览</button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">上传范围</label>
          <div class="space-y-1">
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" name="include_metadata" value="on" checked> 元数据
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" name="include_screenshots" value="on" checked> 截图
            </label>
          </div>
        </div>

        <div>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" name="dry_run" value="on"> Dry Run（预览，不实际上传）
          </label>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">
            开始上传
          </button>
          <button type="button"
                  class="px-4 py-2 border border-gray-300 text-sm rounded hover:bg-gray-50"
                  hx-post="/api/metadata/check"
                  hx-include="#metadata-form"
                  hx-target="#check-result"
                  hx-swap="innerHTML">
            验证环境
          </button>
        </div>

        <div id="check-result" class="text-sm"></div>
      </div>
    </form>
  </div>

  <!-- Step 2: 执行面板 -->
  <div x-show="step === 2" class="max-w-xl">
    <div class="bg-white rounded-lg border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-medium" x-text="status === 'done' ? '✅ 上传完成' : status === 'error' ? '❌ 上传失败' : '⏳ 上传中...'"></h2>
        <button type="button" class="text-sm text-blue-600 hover:underline" @click="step=1; logs=[]; status='idle'">重新运行</button>
      </div>

      <div class="w-full bg-gray-100 rounded-full h-2 mb-2">
        <div class="bg-blue-500 h-2 rounded-full transition-all" :style="`width: ${progress}%`"></div>
      </div>
      <p class="text-xs text-gray-500 mb-4" x-text="progressMsg"></p>

      <div x-data="{ open: false }">
        <button type="button" class="text-sm text-gray-600 hover:underline" @click="open = !open">
          <span x-text="open ? '▼ 收起日志' : '▶ 展开日志'"></span>
        </button>
        <div x-show="open" class="mt-2 bg-gray-900 text-green-400 text-xs font-mono rounded p-3 max-h-64 overflow-y-auto">
          <template x-for="(line, idx) in logs" :key="idx">
            <div x-text="line"></div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <div id="run-result"></div>
</div>

<!-- File browser modal -->
<div id="filebrowser-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-96 p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-medium text-sm">选择路径</h3>
      <button onclick="closeFileBrowser()" class="text-gray-400 hover:text-gray-600">✕</button>
    </div>
    <div id="filebrowser-content"></div>
    <div class="mt-3 flex justify-end">
      <button onclick="closeFileBrowser()" class="px-3 py-1.5 text-sm border border-gray-300 rounded hover:bg-gray-50">取消</button>
    </div>
  </div>
</div>

<script>
let _fbTargetInput = null;
let _fbMode = 'dir';
let _fbExt = '';

function openFileBrowser(inputId, mode, ext) {
  _fbTargetInput = inputId;
  _fbMode = mode;
  _fbExt = ext;
  document.getElementById('filebrowser-modal').classList.remove('hidden');
  const currentVal = document.getElementById(inputId).value || '.';
  htmx.ajax('GET', `/api/browse?path=${encodeURIComponent(currentVal)}&mode=${mode}&ext=${ext}`, {target: '#filebrowser-content', swap: 'innerHTML'});
}

function closeFileBrowser() {
  document.getElementById('filebrowser-modal').classList.add('hidden');
}

function selectFile(path) {
  if (_fbTargetInput) {
    document.getElementById(_fbTargetInput).value = path;
  }
  closeFileBrowser();
}

function startSSE(taskId) {
  const root = document.querySelector('[x-data]');
  const d = Alpine.$data(root);
  const es = new EventSource(`/api/task/${taskId}/stream`);
  es.addEventListener('log', e => { d.logs.push(e.data); });
  es.addEventListener('progress', e => {
    const p = JSON.parse(e.data);
    d.progress = p.pct || 0;
    d.progressMsg = p.msg || '';
  });
  es.addEventListener('done', () => { d.status = 'done'; d.progress = 100; es.close(); });
  es.addEventListener('error_event', () => { d.status = 'error'; es.close(); });
}
</script>
{% endblock %}
