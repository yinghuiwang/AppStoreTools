{% extends "base.html" %}
{% block content %}
<div x-data="profilesApp()" x-init="loadProfiles()">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-semibold flex items-center gap-2">
      <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
      App 管理
    </h1>
    <button @click="openDrawer(null)"
            class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 cursor-pointer transition-colors duration-150 focus-ring flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      新增
    </button>
  </div>

  <!-- Profile list -->
  <div class="bg-white rounded-lg border border-gray-200 divide-y divide-gray-100 max-w-xl">
    <template x-for="p in profiles" :key="p">
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <button @click="setDefault(p)" class="text-lg cursor-pointer" :title="p === defaultProfile ? '默认' : '设为默认'">
            <span x-text="p === defaultProfile ? '★' : '○'" :class="p === defaultProfile ? 'text-yellow-500' : 'text-gray-300'"></span>
          </button>
          <span class="text-sm font-medium" x-text="p"></span>
        </div>
        <div class="flex gap-2">
          <button @click="openDrawer(p)" class="text-xs text-blue-600 hover:text-blue-800 cursor-pointer transition-colors duration-150">编辑</button>
          <button @click="deleteProfile(p)" class="text-xs text-red-500 hover:text-red-700 cursor-pointer transition-colors duration-150">删除</button>
        </div>
      </div>
    </template>
    <div x-show="profiles.length === 0" class="px-4 py-6 text-sm text-gray-400 text-center">
      暂无 App Profile，点击「新增」添加
    </div>
  </div>

  <!-- Drawer backdrop -->
  <div x-show="drawerOpen" class="fixed inset-0 bg-black/30 z-40" @click="drawerOpen = false"></div>

  <!-- Drawer -->
  <div x-show="drawerOpen"
       class="fixed right-0 top-0 h-full w-96 bg-white shadow-xl z-50 overflow-y-auto p-6"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="translate-x-full">
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-semibold" x-text="editingProfile ? '编辑 ' + editingProfile : '新增 App Profile'"></h2>
      <button @click="drawerOpen = false" class="text-gray-400 hover:text-gray-600 cursor-pointer transition-colors duration-150 p-1 rounded focus-ring">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <form @submit.prevent="saveProfile" class="space-y-4">
      <div x-show="!editingProfile">
        <label class="block text-sm font-medium text-gray-700 mb-1">Profile 名称</label>
        <input type="text" x-model="form.name"
               :required="!editingProfile"
               class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus-ring transition-colors duration-150 focus:border-blue-500"
               placeholder="myapp">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Issuer ID</label>
        <div class="relative">
          <input :type="showIssuer ? 'text' : 'password'" x-model="form.issuer_id" required
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm pr-16 focus-ring transition-colors duration-150 focus:border-blue-500">
          <button type="button" @click="showIssuer = !showIssuer"
                  class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400">
            <span x-text="showIssuer ? '隐藏' : '显示'"></span>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Key ID</label>
        <div class="relative">
          <input :type="showKeyId ? 'text' : 'password'" x-model="form.key_id" required
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm pr-16 focus-ring transition-colors duration-150 focus:border-blue-500">
          <button type="button" @click="showKeyId = !showKeyId"
                  class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-400">
            <span x-text="showKeyId ? '隐藏' : '显示'"></span>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">.p8 私钥文件</label>
        <input type="file" accept=".p8" x-ref="keyFileInput"
               class="w-full text-sm text-gray-500 file:mr-3 file:py-1 file:px-3 file:rounded file:border file:border-gray-300 file:text-sm file:bg-white">
        <p x-show="editingProfile" class="text-xs text-gray-400 mt-1">留空则保留原有密钥文件</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">App ID（数字）</label>
        <input type="text" x-model="form.app_id" required
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm"
               placeholder="1234567890">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">默认 CSV 路径（可选）</label>
        <div class="flex gap-2">
          <input type="text" x-model="form.csv" id="profile-csv-input"
                 class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus-ring transition-colors duration-150 focus:border-blue-500">
          <button type="button"
                  class="px-3 py-2 text-sm border border-gray-300 rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring"
                  onclick="openFileBrowser('profile-csv-input', 'file', '.csv')">浏览</button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">默认截图目录（可选）</label>
        <div class="flex gap-2">
          <input type="text" x-model="form.screenshots" id="profile-screenshots-input"
                 class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm font-mono focus-ring transition-colors duration-150 focus:border-blue-500">
          <button type="button"
                  class="px-3 py-2 text-sm border border-gray-300 rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring"
                  onclick="openFileBrowser('profile-screenshots-input', 'dir', '')">浏览</button>
        </div>
      </div>
      <div x-show="formError" class="text-sm text-red-500" x-text="formError"></div>
      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 cursor-pointer transition-colors duration-150 focus-ring"
                x-text="editingProfile ? '保存' : '创建'">
        </button>
        <button type="button" @click="drawerOpen = false"
                class="px-4 py-2 border border-gray-300 text-sm rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring">
          取消
        </button>
      </div>
    </form>
  </div>
</div>

<!-- File browser modal -->
<div id="filebrowser-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-xl w-96 p-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-medium text-sm">选择路径</h3>
      <button onclick="closeFileBrowser()" class="text-gray-400 hover:text-gray-600 cursor-pointer transition-colors duration-150 p-1 rounded focus-ring">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="filebrowser-content"></div>
    <div class="mt-3 flex justify-end">
      <button onclick="closeFileBrowser()" class="px-3 py-1.5 text-sm border border-gray-300 rounded-md hover:bg-gray-50 cursor-pointer transition-colors duration-150 focus-ring">取消</button>
    </div>
  </div>
</div>

<script>
let _fbTargetInput = null;
let _fbMode = 'dir';
let _fbExt = '';

function openFileBrowser(inputId, mode, ext) {
  _fbTargetInput = inputId;
  _fbMode = mode;
  _fbExt = ext;
  document.getElementById('filebrowser-modal').classList.remove('hidden');
  const currentVal = document.getElementById(inputId).value || '.';
  htmx.ajax('GET', `/api/browse?path=${encodeURIComponent(currentVal)}&mode=${mode}&ext=${ext}`, {target: '#filebrowser-content', swap: 'innerHTML'});
}

function closeFileBrowser() {
  document.getElementById('filebrowser-modal').classList.add('hidden');
}

function selectFile(path) {
  if (_fbTargetInput) {
    const el = document.getElementById(_fbTargetInput);
    el.value = path;
    el.dispatchEvent(new Event('input', { bubbles: true }));
  }
  closeFileBrowser();
}

function profilesApp() {
  return {
    profiles: [],
    defaultProfile: '',
    drawerOpen: false,
    editingProfile: null,
    showIssuer: false,
    showKeyId: false,
    formError: '',
    form: { name: '', issuer_id: '', key_id: '', app_id: '', csv: 'data/appstore_info.csv', screenshots: 'data/screenshots' },

    async loadProfiles() {
      const r = await fetch('/api/profiles');
      const d = await r.json();
      this.profiles = d.profiles;
      this.defaultProfile = d.default;
    },

    openDrawer(name) {
      this.editingProfile = name;
      this.formError = '';
      this.showIssuer = false;
      this.showKeyId = false;
      if (name) {
        fetch(`/api/profiles/${name}`).then(r => r.json()).then(d => {
          this.form = { name, issuer_id: d.issuer_id, key_id: d.key_id, app_id: d.app_id, csv: d.csv, screenshots: d.screenshots };
        });
      } else {
        this.form = { name: '', issuer_id: '', key_id: '', app_id: '', csv: 'data/appstore_info.csv', screenshots: 'data/screenshots' };
      }
      this.drawerOpen = true;
    },

    async saveProfile() {
      this.formError = '';
      const fd = new FormData();
      Object.entries(this.form).forEach(([k, v]) => fd.append(k, v));
      const fileInput = this.$refs.keyFileInput;
      if (fileInput && fileInput.files[0]) fd.append('key_file', fileInput.files[0]);

      const url = this.editingProfile ? `/api/profiles/${this.editingProfile}` : '/api/profiles';
      const method = this.editingProfile ? 'PUT' : 'POST';
      const r = await fetch(url, { method, body: fd });
      const d = await r.json();
      if (d.ok) {
        this.drawerOpen = false;
        await this.loadProfiles();
      } else {
        this.formError = d.detail || '保存失败';
      }
    },

    async deleteProfile(name) {
      if (!confirm(`确认删除 ${name}？`)) return;
      await fetch(`/api/profiles/${name}`, { method: 'DELETE' });
      await this.loadProfiles();
    },

    async setDefault(name) {
      await fetch(`/api/profiles/${name}/set-default`, { method: 'POST' });
      this.defaultProfile = name;
    },
  };
}
</script>
{% endblock %}
