{% extends "base.html" %}
{% block content %}
<div class="" x-data="profilesApp()" x-init="loadProfiles()">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-bold tracking-tight text-obsidian-50 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--accent-glow);">
        <svg class="w-4.5 h-4.5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
      </div>
      App 管理
    </h1>
    <button @click="openDrawer(null)"
            class="btn-primary flex items-center gap-1.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      新增
    </button>
  </div>

  <!-- Profile list -->
  <div class="card">
    <template x-for="p in profiles" :key="p">
      <div class="flex items-center justify-between px-5 py-4 border-b border-obsidian-700 last:border-0 hover:bg-obsidian-800/50 transition-colors duration-150 group">
        <div class="flex items-center gap-3">
          <button @click="setDefault(p)" class="cursor-pointer transition-colors duration-150" :title="p === defaultProfile ? '默认' : '设为默认'">
            <span x-text="p === defaultProfile ? '★' : '○'"
                  :class="p === defaultProfile ? 'text-amber-500 text-lg' : 'text-obsidian-600 text-sm group-hover:text-obsidian-400'"></span>
          </button>
          <span class="text-sm font-medium text-obsidian-100 font-mono" x-text="p"></span>
          <span x-show="p === defaultProfile" class="badge badge-info text-[10px]">DEFAULT</span>
        </div>
        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
          <button @click="openDrawer(p)" class="text-xs text-amber-550 hover:text-amber-500 cursor-pointer transition-colors duration-150 font-medium">编辑</button>
          <button @click="deleteProfile(p)" class="text-xs text-red-500 hover:text-red-400 cursor-pointer transition-colors duration-150 font-medium">删除</button>
        </div>
      </div>
    </template>
    <div x-show="profiles.length === 0" class="card-body py-12 text-center">
      <svg class="w-10 h-10 text-obsidian-600 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
      <p class="text-sm text-obsidian-400">暂无 App Profile</p>
      <p class="text-xs text-obsidian-600 mt-1">点击「新增」添加第一个 App</p>
    </div>
  </div>

  <!-- Drawer backdrop -->
  <div x-show="drawerOpen" class="fixed inset-0 z-40" style="background: rgba(0,0,0,0.5); backdrop-filter: blur(2px);" @click="drawerOpen = false"></div>

  <!-- Drawer -->
  <div x-show="drawerOpen"
       class="fixed right-0 top-0 h-full w-[440px] z-50 overflow-y-auto"
       style="background: var(--bg-surface); border-left: 1px solid var(--border-subtle);"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="translate-x-full">
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="font-semibold text-obsidian-50" x-text="editingProfile ? '编辑 ' + editingProfile : '新增 App Profile'"></h2>
        <button @click="drawerOpen = false" class="text-obsidian-500 hover:text-obsidian-300 cursor-pointer transition-colors duration-150 p-1 rounded focus-ring">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <form @submit.prevent="saveProfile" class="space-y-5">
        <!-- Profile name -->
        <div x-show="!editingProfile">
          <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">Profile 名称</label>
          <input type="text" x-model="form.name"
                 :required="!editingProfile"
                 class="field-input w-full"
                 placeholder="myapp">
        </div>

        <!-- Issuer ID -->
        <div>
          <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">Issuer ID</label>
          <div class="relative">
            <input :type="showIssuer ? 'text' : 'password'" x-model="form.issuer_id" required
                   class="field-input w-full pr-16">
            <button type="button" @click="showIssuer = !showIssuer"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-obsidian-500 hover:text-obsidian-300 uppercase tracking-wider font-medium cursor-pointer transition-colors duration-150">
              <span x-text="showIssuer ? '隐藏' : '显示'"></span>
            </button>
          </div>
        </div>

        <!-- Key ID -->
        <div>
          <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">Key ID</label>
          <div class="relative">
            <input :type="showKeyId ? 'text' : 'password'" x-model="form.key_id" required
                   class="field-input w-full pr-16">
            <button type="button" @click="showKeyId = !showKeyId"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-obsidian-500 hover:text-obsidian-300 uppercase tracking-wider font-medium cursor-pointer transition-colors duration-150">
              <span x-text="showKeyId ? '隐藏' : '显示'"></span>
            </button>
          </div>
        </div>

        <!-- .p8 key file -->
        <div>
          <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">.p8 私钥文件</label>
          <input type="file" accept=".p8" x-ref="keyFileInput"
                 class="w-full text-sm text-obsidian-400 file:mr-3 file:py-1.5 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-medium file:uppercase file:tracking-wider file:cursor-pointer" style="color: var(--text-muted); --tw-file-bg: var(--bg-overlay); --tw-file-text: var(--text-secondary);">
          <p x-show="editingProfile" class="text-[11px] text-obsidian-500 mt-1.5">留空则保留原有密钥文件</p>
        </div>

        <!-- App ID -->
        <div>
          <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium mb-2 block">App ID（数字）</label>
          <input type="text" x-model="form.app_id" required
                 class="field-input w-full"
                 placeholder="1234567890">
        </div>

        <!-- CSV path -->
        <div>
          <div class="flex items-center gap-1.5 mb-2">
            <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">默认 CSV 路径（可选）</label>
            <button type="button" @click="showCsvHelp = !showCsvHelp"
                    class="w-4 h-4 inline-flex items-center justify-center rounded-full border border-obsidian-600 text-obsidian-500 hover:text-amber-500 hover:border-amber-550 cursor-pointer transition-colors duration-150 focus-ring text-[9px]"
                    title="CSV 格式说明">?</button>
          </div>
          <div x-show="showCsvHelp" x-transition class="mb-2 p-4 rounded-lg text-xs space-y-2" style="background: var(--accent-glow); border: 1px solid rgba(232,161,37,0.2);">
            <p class="font-medium text-amber-500">CSV 格式要求</p>
            <p class="text-obsidian-200"><span class="font-mono text-amber-550">UTF-8</span> 编码，首行为表头，支持 BOM。</p>
            <p class="text-obsidian-200"><span class="font-medium text-obsidian-100">必填列：</span><code class="bg-obsidian-800 px-1.5 py-0.5 rounded text-amber-550">语言</code> <code class="bg-obsidian-800 px-1.5 py-0.5 rounded text-amber-550">应用名称</code> <code class="bg-obsidian-800 px-1.5 py-0.5 rounded text-amber-550">副标题</code></p>
            <a href="/api/examples/csv" download
               class="inline-flex items-center gap-1.5 text-amber-550 hover:text-amber-500 cursor-pointer transition-colors duration-150 font-medium">
              下载示例 CSV
            </a>
          </div>
          <div class="flex gap-2">
            <input type="text" x-model="form.csv" id="profile-csv-input"
                   class="field-input flex-1">
            <button type="button"
                    class="btn-ghost whitespace-nowrap"
                    onclick="openFileBrowser('profile-csv-input', 'file', '.csv')">浏览</button>
          </div>
        </div>

        <!-- Screenshots dir -->
        <div>
          <div class="flex items-center gap-1.5 mb-2">
            <label class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">默认截图目录（可选）</label>
            <button type="button" @click="showScreenshotsHelp = !showScreenshotsHelp"
                    class="w-4 h-4 inline-flex items-center justify-center rounded-full border border-obsidian-600 text-obsidian-500 hover:text-amber-500 hover:border-amber-550 cursor-pointer transition-colors duration-150 focus-ring text-[9px]"
                    title="截图目录说明">?</button>
          </div>
          <div x-show="showScreenshotsHelp" x-transition class="mb-2 p-4 rounded-lg text-xs space-y-2" style="background: var(--accent-glow); border: 1px solid rgba(232,161,37,0.2);">
            <p class="font-medium text-amber-500">截图目录结构</p>
            <pre class="bg-obsidian-800 rounded px-3 py-2 text-[11px] leading-relaxed font-mono text-obsidian-200">screenshots/
├── zh-Hans/
│   ├── 01_home.png
│   └── 02_detail.png
└── en-US/
    └── 01_home.png</pre>
            <a href="/api/examples/screenshots" download
               class="inline-flex items-center gap-1.5 text-amber-550 hover:text-amber-500 cursor-pointer transition-colors duration-150 font-medium">
              下载示例截图目录
            </a>
          </div>
          <div class="flex gap-2">
            <input type="text" x-model="form.screenshots" id="profile-screenshots-input"
                   class="field-input flex-1">
            <button type="button"
                    class="btn-ghost whitespace-nowrap"
                    onclick="openFileBrowser('profile-screenshots-input', 'dir', '')">浏览</button>
          </div>
        </div>

        <!-- Error -->
        <div x-show="formError" class="rounded-lg p-3 bg-red-500/10 text-red-400 border border-red-500/20 text-sm" x-text="formError"></div>

        <!-- Actions -->
        <div class="flex gap-3 pt-4 border-t border-obsidian-700">
          <button type="submit" class="btn-primary" x-text="editingProfile ? '保存' : '创建'"></button>
          <button type="button" @click="drawerOpen = false" class="btn-ghost">取消</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- File browser modal -->
<div id="filebrowser-modal" class="hidden fixed inset-0 flex items-center justify-center z-50" style="background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);">
  <div class="card w-[420px]">
    <div class="card-header flex items-center justify-between">
      <h3 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">选择路径</h3>
      <button onclick="closeFileBrowser()" class="text-obsidian-500 hover:text-obsidian-300 cursor-pointer transition-colors duration-150 p-1 rounded focus-ring">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="filebrowser-content" class="card-body"></div>
    <div class="px-5 py-3 border-t border-obsidian-700 flex justify-end">
      <button onclick="closeFileBrowser()" class="btn-ghost">取消</button>
    </div>
  </div>
</div>

<script>
let _fbTargetInput = null;
let _fbMode = 'dir';
let _fbExt = '';

function openFileBrowser(inputId, mode, ext) {
  _fbTargetInput = inputId;
  _fbMode = mode;
  _fbExt = ext;
  document.getElementById('filebrowser-modal').classList.remove('hidden');
  const currentVal = document.getElementById(inputId).value || '.';
  htmx.ajax('GET', `/api/browse?path=${encodeURIComponent(currentVal)}&mode=${mode}&ext=${ext}`, {target: '#filebrowser-content', swap: 'innerHTML'});
}

function closeFileBrowser() {
  document.getElementById('filebrowser-modal').classList.add('hidden');
}

function selectFile(path) {
  if (_fbTargetInput) {
    const el = document.getElementById(_fbTargetInput);
    el.value = path;
    el.dispatchEvent(new Event('input', { bubbles: true }));
  }
  closeFileBrowser();
}

function profilesApp() {
  return {
    profiles: [],
    defaultProfile: '',
    drawerOpen: false,
    editingProfile: null,
    showIssuer: false,
    showKeyId: false,
    showCsvHelp: false,
    showScreenshotsHelp: false,
    formError: '',
    form: { name: '', issuer_id: '', key_id: '', app_id: '', csv: 'data/appstore_info.csv', screenshots: 'data/screenshots' },

    async loadProfiles() {
      const r = await fetch('/api/profiles');
      const d = await r.json();
      this.profiles = d.profiles;
      this.defaultProfile = d.default;
    },

    openDrawer(name) {
      this.editingProfile = name;
      this.formError = '';
      this.showIssuer = false;
      this.showKeyId = false;
      this.showCsvHelp = false;
      this.showScreenshotsHelp = false;
      if (name) {
        fetch(`/api/profiles/${name}`).then(r => r.json()).then(d => {
          this.form = { name, issuer_id: d.issuer_id, key_id: d.key_id, app_id: d.app_id, csv: d.csv, screenshots: d.screenshots };
        });
      } else {
        this.form = { name: '', issuer_id: '', key_id: '', app_id: '', csv: 'data/appstore_info.csv', screenshots: 'data/screenshots' };
      }
      this.drawerOpen = true;
    },

    async saveProfile() {
      this.formError = '';
      const fd = new FormData();
      Object.entries(this.form).forEach(([k, v]) => fd.append(k, v));
      const fileInput = this.$refs.keyFileInput;
      if (fileInput && fileInput.files[0]) fd.append('key_file', fileInput.files[0]);

      const url = this.editingProfile ? `/api/profiles/${this.editingProfile}` : '/api/profiles';
      const method = this.editingProfile ? 'PUT' : 'POST';
      const r = await fetch(url, { method, body: fd });
      const d = await r.json();
      if (d.ok) {
        this.drawerOpen = false;
        await this.loadProfiles();
      } else {
        this.formError = d.detail || '保存失败';
      }
    },

    async deleteProfile(name) {
      if (!confirm(`确认删除 ${name}？`)) return;
      await fetch(`/api/profiles/${name}`, { method: 'DELETE' });
      await this.loadProfiles();
    },

    async setDefault(name) {
      await fetch(`/api/profiles/${name}/set-default`, { method: 'POST' });
      this.defaultProfile = name;
    },
  };
}
</script>
{% endblock %}
