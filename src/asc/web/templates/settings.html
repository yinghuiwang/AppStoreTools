{% extends "base.html" %}
{% block content %}
<h1 class="text-xl font-semibold mb-6 flex items-center gap-2">
  <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
  设置
</h1>

<div class="max-w-2xl space-y-6">
  <!-- Guard status -->
  <div class="bg-white rounded-lg border border-gray-200 p-5"
       x-data="{ guard: null }"
       x-init="
         fetch('/api/guard/status')
           .then(r => r.json())
           .then(data => { guard = data; })
           .catch(() => { guard = null; })
       ">
    <h2 class="font-medium text-sm mb-2 flex items-center gap-1.5">
      <svg class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
      Guard 安全守卫
    </h2>
    <template x-if="guard">
      <div>
        <p class="text-sm mb-3"
           :class="guard.enabled ? 'text-green-600' : 'text-gray-400'"
           x-text="guard.enabled ? '状态：已启用' : '状态：已禁用'"></p>

        <!-- Bindings table -->
        <template x-if="guard.enabled && Object.keys(guard.bindings.machine).length + Object.keys(guard.bindings.ip).length + Object.keys(guard.bindings.credential).length > 0">
          <div>
            <h3 class="text-xs font-medium text-gray-500 mb-2">绑定详情</h3>
            <div class="space-y-2">
              <template x-for="(row, idx) in (() => {
                const apps = {};
                const bindings = guard.bindings;
                for (const [fp, info] of Object.entries(bindings.machine || {})) {
                  const key = info.profile_name || info.app_name || info.app_id;
                  if (!apps[key]) apps[key] = {profile_name: info.profile_name || '', app_name: info.app_name || '', app_id: info.app_id, credential: '', machine: fp, ip: '', bound_at: info.bound_at};
                  else apps[key].machine = fp;
                  if (info.bound_at) apps[key].bound_at = info.bound_at;
                }
                for (const [ip, info] of Object.entries(bindings.ip || {})) {
                  const key = info.profile_name || info.app_name || info.app_id;
                  if (!apps[key]) apps[key] = {profile_name: info.profile_name || '', app_name: info.app_name || '', app_id: info.app_id, credential: '', machine: '', ip: ip, bound_at: info.bound_at};
                  else apps[key].ip = ip;
                  if (info.bound_at) apps[key].bound_at = info.bound_at;
                }
                for (const [key_id, info] of Object.entries(bindings.credential || {})) {
                  const key = info.profile_name || info.app_name || info.app_id;
                  if (!apps[key]) apps[key] = {profile_name: info.profile_name || '', app_name: info.app_name || '', app_id: info.app_id, credential: key_id, machine: '', ip: '', bound_at: info.bound_at};
                  else apps[key].credential = key_id;
                  if (info.bound_at) apps[key].bound_at = info.bound_at;
                }
                const sorted = Object.values(apps);
                sorted.sort((a, b) => {
                  if (a.profile_name === guard.current_profile) return -1;
                  if (b.profile_name === guard.current_profile) return 1;
                  return 0;
                });
                return sorted;
              })()" :key="idx">
                <div class="flex items-center gap-3 text-sm py-1.5 border-b border-gray-100 last:border-0">
                  <span x-text="row.profile_name === guard.current_profile ? '★' : ''"
                        :class="row.profile_name === guard.current_profile ? 'text-yellow-500 font-bold' : 'text-gray-300'"></span>
                  <span class="font-mono min-w-[80px]" x-text="row.profile_name || row.app_id"></span>
                  <span class="text-xs text-gray-500 min-w-[120px]" x-text="row.app_name && row.app_name !== row.profile_name ? row.app_name : ''"></span>
                  <span class="text-xs text-gray-500 min-w-[100px]" x-text="row.credential ? '凭证 ' + row.credential : ''"></span>
                  <span class="text-xs text-gray-500 min-w-[100px]" x-text="row.machine ? '机器 ' + row.machine : ''"></span>
                  <span class="text-xs text-gray-500 min-w-[80px]" x-text="row.ip ? 'IP ' + row.ip : ''"></span>
                  <span class="text-xs text-gray-400" x-text="row.bound_at ? '绑定于 ' + row.bound_at.slice(0, 16) : ''"></span>
                </div>
              </template>
            </div>
          </div>
        </template>

        <template x-if="guard.enabled && Object.keys(guard.bindings.machine).length === 0 && Object.keys(guard.bindings.ip).length === 0 && Object.keys(guard.bindings.credential).length === 0">
          <p class="text-xs text-gray-400">暂无绑定记录</p>
        </template>

        <p class="text-xs text-gray-400 mt-2">Guard 将凭证绑定到当前机器和 IP，防止凭证滥用。</p>
        <p class="text-xs text-gray-400">如需修改，请使用 CLI：<code class="font-mono">asc guard enable/disable</code></p>
      </div>
    </template>
    <template x-if="!guard">
      <p class="text-sm text-red-500">Guard 状态读取失败</p>
    </template>
  </div>

  <!-- Language -->
  <div class="bg-white rounded-lg border border-gray-200 p-5">
    <h2 class="font-medium text-sm mb-3">语言</h2>
    <select class="border border-gray-300 rounded-md px-3 py-2 text-sm focus-ring cursor-pointer transition-colors duration-150 focus:border-blue-500"
            hx-post="/api/settings/lang"
            hx-trigger="change"
            hx-include="this"
            name="lang">
      <option value="zh">中文</option>
      <option value="en">English</option>
    </select>
  </div>
</div>
{% endblock %}
