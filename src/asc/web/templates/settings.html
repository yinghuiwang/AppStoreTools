{% extends "base.html" %}
{% block content %}
<div class="">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold tracking-tight text-obsidian-50 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--accent-glow);">
        <svg class="w-4.5 h-4.5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
      </div>
      设置
    </h1>
  </div>

  <div class="space-y-6">
    <!-- LLM Configuration -->
<div class="card"
     x-data="{
       configs: {},
       defaultName: null,
       activeName: null,
       editName: '',
       editBaseUrl: 'https://api.openai.com/v1',
       editApiKey: '',
       editModel: 'gpt-4o',
       showForm: false,
       saving: false,
       saved: false,
       loading: true,
       isEditing: false,
       saveError: '',
     }"
     x-init="
       fetch('/api/settings/llm')
         .then(r => r.json())
         .then(d => {
           configs = d.configs || {};
           defaultName = d.default;
           activeName = d.default || Object.keys(configs)[0] || '';
           loading = false;
         })
         .catch(() => { loading = false; })
     ">
  <div class="card-header flex items-center gap-2">
    <svg class="w-4 h-4 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z"/></svg>
    <h2 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">LLM 翻译配置</h2>
    <button @click="showForm = true; isEditing = false; editName = ''; editBaseUrl = 'https://api.openai.com/v1'; editApiKey = ''; editModel = 'gpt-4o'"
            class="ml-auto text-xs btn-secondary py-1 px-2">+ 新增配置</button>
  </div>
  <div class="card-body space-y-4">

    <!-- Add/Edit Form -->
    <template x-if="showForm">
      <div class="space-y-3 p-3 border border-obsidian-600 rounded-lg bg-obsidian-800/30">
        <div class="flex items-center gap-2">
          <span class="text-xs text-amber-400" x-show="!editName">新增配置</span>
          <span class="text-xs text-amber-400" x-show="editName">编辑配置</span>
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">配置名称</label>
          <input type="text" x-model="editName" placeholder="例如: openai, claude"
                 class="field-input w-full text-xs" :disabled="isEditing">
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">Base URL</label>
          <input type="text" x-model="editBaseUrl" placeholder="https://api.openai.com/v1"
                 class="field-input w-full text-xs">
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">API Key</label>
          <input type="password" x-model="editApiKey" placeholder="sk-..." class="field-input w-full text-xs">
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">Model</label>
          <input type="text" x-model="editModel" placeholder="gpt-4o" class="field-input w-full text-xs">
        </div>
        <template x-if="saveError">
          <div class="text-xs text-red-400 py-1" x-text="saveError"></div>
        </template>
        <div class="flex gap-2">
          <button @click="
            saving = true;
            saveError = '';
            const name = isEditing ? editName : (editName || ('config' + (Object.keys(configs).length + 1)));
            fetch('/api/settings/llm', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                name: name,
                base_url: editBaseUrl,
                api_key: editApiKey,
                model: editModel,
                set_default: true
              })
            })
            .then(r => r.json())
            .then(d => { if (d.error) throw new Error(d.error); return fetch('/api/settings/llm'); })
            .then(r => r.json())
            .then(d => {
              configs = d.configs || {};
              defaultName = d.default;
              activeName = d.default || Object.keys(configs)[0] || '';
              showForm = false;
              saved = true;
              setTimeout(() => { saved = false; saving = false; }, 2000);
            })
            .catch(err => {
                saving = false;
                if (err.message && err.message.includes('HTTP')) {
                    saveError = '保存失败：' + err.message;
                } else {
                    saveError = '保存失败，请重试';
                }
                console.error('LLM config save error:', err);
            })
          " :disabled="saving" class="btn-primary text-xs px-3 py-1.5">
            <span x-show="!saving">保存</span>
            <span x-show="saving">保存中...</span>
          </button>
          <button @click="showForm = false" class="btn-secondary text-xs px-3 py-1.5">取消</button>
        </div>
      </div>
    </template>

    <!-- Config List -->
    <template x-if="!loading && Object.keys(configs).length === 0">
      <div class="text-sm text-obsidian-500 py-2">暂无配置，请点击「新增配置」添加</div>
    </template>
    <template x-if="!loading && Object.keys(configs).length > 0">
      <div class="space-y-2">
        <template x-for="(cfg, name) in configs" :key="name">
          <div class="flex items-center gap-3 p-2 rounded-lg border"
               :class="name === activeName ? 'border-amber-500/50 bg-amber-500/5' : 'border-obsidian-700'">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-xs font-medium" :class="name === activeName ? 'text-amber-400' : 'text-obsidian-300'"
                      x-text="name"></span>
                <span x-show="name === defaultName" class="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-400">默认</span>
              </div>
              <div class="text-[10px] text-obsidian-500 truncate" x-text="cfg.base_url + ' / ' + cfg.model"></div>
            </div>
            <div class="flex gap-1">
              <button @click="
                fetch('/api/settings/llm/default', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({name})
                }).then(() => {
                  defaultName = name;
                  activeName = name;
                })"
                      x-show="name !== defaultName"
                      class="text-[10px] btn-secondary py-1 px-2">设为默认</button>
              <button @click="
                isEditing = true;
                editName = name;
                editBaseUrl = cfg.base_url;
                editApiKey = cfg.api_key || '';
                editModel = cfg.model;
                showForm = true"
                      class="text-[10px] btn-secondary py-1 px-2">编辑</button>
              <button @click="
                fetch('/api/settings/llm?name=' + encodeURIComponent(name), {method: 'DELETE'})
                  .then(() => fetch('/api/settings/llm'))
                  .then(r => r.json())
                  .then(d => {
                    configs = d.configs || {};
                    defaultName = d.default;
                    activeName = d.default || Object.keys(configs)[0] || '';
                  })"
                      class="text-[10px] px-2 py-1 rounded border border-red-500/30 text-red-400 hover:bg-red-500/10">删除</button>
            </div>
          </div>
        </template>
      </div>
    </template>

    <template x-if="saved">
      <div class="text-xs text-emerald-400">已保存</div>
    </template>
  </div>
</div>

    <!-- Webhook Notifications -->
    <div class="card"
         x-data="{
           config: {
             enabled: false,
             notify_kinds: [],
             notify_statuses: [],
             providers: {
               feishu: {enabled: false, url: '', secret: ''},
               wecom: {enabled: false, url: '', secret: ''},
               dingtalk: {enabled: false, url: '', secret: ''}
             }
           },
           loading: true,
           saving: false,
           saved: false,
           error: '',
           testResults: [],
           taskKinds: [
             ['metadata', '元数据上传'],
             ['build', '构建上传'],
             ['whats-new', '更新说明上传'],
             ['iap', '内购上传'],
             ['iap-review-screenshots', 'IAP 审核截图上传'],
             ['urls', 'URL 更新'],
             ['update', '工具更新']
           ],
           statuses: [
             ['done', '成功'],
             ['error', '失败'],
             ['canceled', '已取消']
           ],
           providers: [
             ['feishu', '飞书/Lark'],
             ['wecom', '企业微信'],
             ['dingtalk', '钉钉']
           ],
           applyConfig(data) {
             this.config = {
               ...this.config,
               ...data,
               providers: {
                 ...this.config.providers,
                 ...(data.providers || {})
               }
             };
           },
           load() {
             fetch('/api/settings/webhooks')
               .then(r => r.json())
               .then(d => { this.applyConfig(d); })
               .catch(() => { this.error = '加载失败'; })
               .finally(() => { this.loading = false; });
           },
           toggleList(listName, value, checked) {
             const items = this.config[listName] || [];
             this.config[listName] = checked
               ? Array.from(new Set([...items, value]))
               : items.filter(item => item !== value);
           },
           save() {
             this.persist(true).catch(() => {});
           },
           persist(showSaved) {
             this.saving = true;
             this.error = '';
             return fetch('/api/settings/webhooks', {
               method: 'POST',
               headers: {'Content-Type': 'application/json'},
               body: JSON.stringify(this.config)
             })
             .then(r => r.json().then(d => ({ok: r.ok, data: d})))
             .then(({ok, data}) => {
               if (!ok || data.error) throw new Error(data.error || '保存失败');
               if (showSaved) this.saved = true;
               return fetch('/api/settings/webhooks');
             })
             .then(r => r.json())
             .then(d => {
               this.applyConfig(d);
               if (showSaved) setTimeout(() => { this.saved = false; }, 2000);
             })
             .catch(err => {
               this.error = err.message || '保存失败';
               throw err;
             })
             .finally(() => { this.saving = false; });
           },
           test(provider) {
             this.testResults = [];
             this.persist(false).then(() => fetch('/api/settings/webhooks/test', {
               method: 'POST',
               headers: {'Content-Type': 'application/json'},
               body: JSON.stringify({provider})
             }))
             .then(r => r.json())
             .then(d => { this.testResults = d.results || [{provider, ok: false, error: d.error || '测试失败'}]; })
             .catch(err => { this.testResults = [{provider, ok: false, error: err.message || '测试失败'}]; });
           }
         }"
         x-init="load()">
      <div class="card-header flex items-center gap-2">
        <h2 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">群通知 / Webhook</h2>
        <button @click="save()" :disabled="saving || !config" class="ml-auto btn-primary text-xs px-3 py-1.5">
          <span x-show="!saving">保存</span>
          <span x-show="saving">保存中...</span>
        </button>
      </div>
      <div class="card-body space-y-4">
        <div x-show="loading && !error" class="text-sm text-obsidian-500 py-2">加载中...</div>
        <template x-if="error">
          <div class="text-xs text-red-400" x-text="error"></div>
        </template>
        <template x-if="saved">
          <div class="text-xs text-emerald-400">已保存</div>
        </template>

        <div class="space-y-4" x-show="config">
          <label class="flex items-center gap-2 text-sm text-obsidian-300">
            <input type="checkbox" x-model="config.enabled" class="rounded border-obsidian-600 bg-obsidian-800">
            启用任务结果群通知
          </label>

          <div class="grid gap-4 md:grid-cols-2">
            <div>
              <div class="text-xs text-obsidian-500 mb-2">通知任务</div>
              <div class="grid gap-2 sm:grid-cols-2">
                <template x-for="kind in taskKinds" :key="kind[0]">
                  <label class="flex items-center gap-2 text-xs text-obsidian-300">
                    <input type="checkbox"
                           :checked="(config.notify_kinds || []).includes(kind[0])"
                           @change="toggleList('notify_kinds', kind[0], $event.target.checked)"
                           class="rounded border-obsidian-600 bg-obsidian-800">
                    <span x-text="kind[1]"></span>
                  </label>
                </template>
              </div>
            </div>

            <div>
              <div class="text-xs text-obsidian-500 mb-2">通知状态</div>
              <div class="grid gap-2 sm:grid-cols-3">
                <template x-for="status in statuses" :key="status[0]">
                  <label class="flex items-center gap-2 text-xs text-obsidian-300">
                    <input type="checkbox"
                           :checked="(config.notify_statuses || []).includes(status[0])"
                           @change="toggleList('notify_statuses', status[0], $event.target.checked)"
                           class="rounded border-obsidian-600 bg-obsidian-800">
                    <span x-text="status[1]"></span>
                  </label>
                </template>
              </div>
            </div>
          </div>

          <div class="space-y-3">
            <template x-for="provider in providers" :key="provider[0]">
              <div class="rounded-lg border border-obsidian-700 p-3 space-y-3">
                <div class="flex items-center gap-3">
                  <label class="flex items-center gap-2 text-sm text-obsidian-300">
                    <input type="checkbox"
                           x-model="config.providers[provider[0]].enabled"
                           class="rounded border-obsidian-600 bg-obsidian-800">
                    <span x-text="provider[1]"></span>
                  </label>
                  <button @click="test(provider[0])" type="button" :disabled="saving" class="ml-auto btn-secondary text-xs px-3 py-1.5">保存并测试</button>
                </div>
                <div class="grid gap-3 md:grid-cols-2">
                  <div>
                    <label class="text-xs text-obsidian-500 mb-1 block">Webhook URL</label>
                    <input type="url"
                           x-model="config.providers[provider[0]].url"
                           placeholder="https://..."
                           class="field-input w-full text-xs">
                  </div>
                  <div>
                    <label class="text-xs text-obsidian-500 mb-1 block">Secret / Signing Key</label>
                    <input type="password"
                           x-model="config.providers[provider[0]].secret"
                           :placeholder="config.providers[provider[0]].has_secret ? '已保存 Secret，留空将保留原值' : 'Secret / 签名密钥（可选）'"
                           class="field-input w-full text-xs">
                    <div x-show="config.providers[provider[0]].has_secret" class="mt-1 text-[10px] text-obsidian-500">已保存 Secret，留空将保留原值</div>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <template x-if="testResults.length > 0">
            <div class="space-y-1">
              <template x-for="result in testResults" :key="result.provider">
                <div class="text-xs" :class="result.ok ? 'text-emerald-400' : 'text-red-400'">
                  <span x-text="providers.find(p => p[0] === result.provider)?.[1] || result.provider"></span>
                  <span x-text="result.ok ? '测试发送成功' : (result.error || '测试失败')"></span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Language -->
    <div class="card">
      <div class="card-header">
        <h2 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">语言</h2>
      </div>
      <div class="card-body">
        <select class="field-select"
                hx-post="/api/settings/lang"
                hx-trigger="change"
                hx-include="this"
                name="lang">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
  </div>
</div>
{% endblock %}
