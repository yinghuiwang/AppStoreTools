{% extends "base.html" %}
{% block content %}
<div class="">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold tracking-tight text-obsidian-50 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--accent-glow);">
        <svg class="w-4.5 h-4.5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
      </div>
      设置
    </h1>
  </div>

  <div class="space-y-6">
    <!-- Guard status -->
    <div class="card"
         x-data="{
           guard: null,
           savingNote: '',
           loadGuard() {
             return fetch('/api/guard/status')
               .then(r => r.json())
               .then(data => { this.guard = data; })
               .catch(() => { this.guard = null; });
           },
           noteRows() {
             if (!this.guard || !this.guard.bindings) return [];
             const apps = {};
             const notes = this.guard.app_notes || {};
             for (const bindings of Object.values(this.guard.bindings)) {
               for (const info of Object.values(bindings || {})) {
                 const appId = String(info.app_id || '');
                 if (!appId || apps[appId]) continue;
                 apps[appId] = {
                   app_id: appId,
                   app: info.profile_name || info.app_name || info.app_id,
                   note: notes[appId] || ''
                 };
               }
             }
             return Object.values(apps);
           },
           saveNote(row) {
             const token = row.app_id;
             this.savingNote = token;
             return fetch('/api/guard/note', {
               method: 'POST',
               headers: {'Content-Type': 'application/x-www-form-urlencoded'},
               body: new URLSearchParams({app_id: row.app_id, note: row.note || ''})
             })
               .then(r => {
                 if (!r.ok) throw new Error('save failed');
                 return this.loadGuard();
               })
               .finally(() => { this.savingNote = ''; });
           }
         }"
         x-init="loadGuard()">
      <div class="card-header flex items-center gap-2">
        <svg class="w-4 h-4 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
        <h2 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">Guard 安全守卫</h2>
      </div>
      <div class="card-body">
        <template x-if="guard">
          <div>
            <!-- Status indicator -->
            <div class="flex items-center gap-3 mb-4">
              <div class="w-2 h-2 rounded-full" :class="guard.enabled ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.5)]' : 'bg-obsidian-600'"></div>
              <p class="text-sm font-medium"
                 :class="guard.enabled ? 'text-emerald-400' : 'text-obsidian-400'"
                 x-text="guard.enabled ? '状态：已启用' : '状态：已禁用'"></p>
            </div>

            <!-- Bindings list -->
            <template x-if="guard.enabled && Object.keys(guard.bindings.machine).length + Object.keys(guard.bindings.ip).length + Object.keys(guard.bindings.credential).length > 0">
              <div>
                <h3 class="text-[10px] uppercase tracking-widest text-obsidian-500 font-medium mb-3">绑定详情</h3>
                <div class="space-y-3">
                  <template x-for="(row, idx) in (() => {
                    const apps = {};
                    const bindings = guard.bindings;
                    const appNotes = guard.app_notes || {};
                    const append = (row, field, value) => {
                      if (!value) return;
                      if (row[field] && row[field].split(', ').includes(value)) return;
                      row[field] = row[field] ? `${row[field]}, ${value}` : value;
                    };
                    for (const [fp, info] of Object.entries(bindings.machine || {})) {
                      const appId = String(info.app_id || '');
                      const key = info.profile_name || info.app_name || appId;
                      if (!apps[key]) apps[key] = {profile_name: info.profile_name || '', app_name: info.app_name || '', app_id: appId, machine: '', ip: '', bound_at: info.bound_at, note: appNotes[appId] || ''};
                      append(apps[key], 'machine', fp);
                      if (info.bound_at) apps[key].bound_at = info.bound_at;
                    }
                    for (const [ip, info] of Object.entries(bindings.ip || {})) {
                      const appId = String(info.app_id || '');
                      const key = info.profile_name || info.app_name || appId;
                      if (!apps[key]) apps[key] = {profile_name: info.profile_name || '', app_name: info.app_name || '', app_id: appId, machine: '', ip: '', bound_at: info.bound_at, note: appNotes[appId] || ''};
                      append(apps[key], 'ip', ip);
                      if (info.bound_at) apps[key].bound_at = info.bound_at;
                    }
                    for (const [key_id, info] of Object.entries(bindings.credential || {})) {
                      const appId = String(info.app_id || '');
                      const key = info.profile_name || info.app_name || appId;
                      if (!apps[key]) apps[key] = {profile_name: info.profile_name || '', app_name: info.app_name || '', app_id: appId, machine: '', ip: '', bound_at: info.bound_at, note: appNotes[appId] || ''};
                      if (info.bound_at) apps[key].bound_at = info.bound_at;
                    }
                    const sorted = Object.values(apps);
                    sorted.sort((a, b) => {
                      if (a.profile_name === guard.current_profile) return -1;
                      if (b.profile_name === guard.current_profile) return 1;
                      return 0;
                    });
                    return sorted;
                  })()" :key="idx">
                    <div class="rounded-lg p-4 space-y-3"
                         style="background: var(--bg-base); border: 1px solid var(--border-subtle);"
                         :class="row.profile_name === guard.current_profile ? '' : ''">
                      <!-- Profile header -->
                      <div class="flex items-center gap-2">
                        <span x-text="row.profile_name === guard.current_profile ? '★' : ''"
                              :class="row.profile_name === guard.current_profile ? 'text-amber-500' : 'text-obsidian-600'"></span>
                        <span class="font-mono text-sm font-medium text-obsidian-100" x-text="row.profile_name || row.app_id"></span>
                        <span x-show="row.app_name && row.app_name !== row.profile_name" class="text-xs text-obsidian-400" x-text="row.app_name"></span>
                        <span x-show="row.profile_name === guard.current_profile" class="badge badge-info text-[10px]">当前</span>
                      </div>
                      <!-- Detail grid -->
                      <div class="grid grid-cols-2 gap-x-6 gap-y-2">
                        <template x-if="row.app_id">
                          <div>
                            <span class="text-[10px] uppercase tracking-widest text-obsidian-500 block mb-0.5">App ID</span>
                            <span class="text-xs text-obsidian-200 font-mono break-all" x-text="row.app_id"></span>
                          </div>
                        </template>
                        <template x-if="row.machine">
                          <div>
                            <span class="text-[10px] uppercase tracking-widest text-obsidian-500 block mb-0.5">机器指纹</span>
                            <span class="text-xs text-obsidian-200 font-mono break-all" x-text="row.machine"></span>
                          </div>
                        </template>
                        <template x-if="row.ip">
                          <div>
                            <span class="text-[10px] uppercase tracking-widest text-obsidian-500 block mb-0.5">绑定 IP</span>
                            <span class="text-xs text-obsidian-200 font-mono" x-text="row.ip"></span>
                          </div>
                        </template>
                        <template x-if="row.bound_at">
                          <div>
                            <span class="text-[10px] uppercase tracking-widest text-obsidian-500 block mb-0.5">绑定时间</span>
                            <span class="text-xs text-obsidian-400 font-mono" x-text="row.bound_at.slice(0,19).replace('T',' ')"></span>
                          </div>
                        </template>
                        <template x-if="row.note">
                          <div class="col-span-2">
                            <span class="text-[10px] uppercase tracking-widest text-obsidian-500 block mb-0.5">备注</span>
                            <span class="text-xs text-obsidian-300 break-all" x-text="row.note"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
                <div class="mt-5 pt-4 border-t border-obsidian-800">
                  <h4 class="text-[10px] uppercase tracking-widest text-obsidian-500 font-medium mb-3">编辑备注</h4>
                  <div class="space-y-2">
                    <template x-for="row in noteRows()" :key="row.app_id">
                      <div class="grid grid-cols-[84px_minmax(0,1fr)_minmax(180px,260px)_auto] items-center gap-2">
                        <span class="text-[11px] text-obsidian-400">App</span>
                        <span class="text-xs text-obsidian-200 font-mono truncate" :title="row.app_id" x-text="row.app_id"></span>
                        <input class="field-input text-xs h-9"
                               type="text"
                               placeholder="备注"
                               x-model="row.note">
                        <button type="button"
                                class="btn-secondary text-xs h-9 px-3"
                                @click="saveNote(row)"
                                :disabled="savingNote === row.app_id">
                          <span x-text="savingNote === row.app_id ? '保存中' : '保存备注'"></span>
                        </button>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <template x-if="guard.enabled && Object.keys(guard.bindings.machine).length === 0 && Object.keys(guard.bindings.ip).length === 0 && Object.keys(guard.bindings.credential).length === 0">
              <p class="text-xs text-obsidian-500">暂无绑定记录</p>
            </template>

            <div class="mt-4 pt-4 border-t border-obsidian-700 space-y-1.5">
              <p class="text-[11px] text-obsidian-500">Guard 将凭证绑定到当前机器和 IP，防止凭证滥用。</p>
              <p class="text-[11px] text-obsidian-500">可在此编辑绑定备注；启用、禁用和解绑仍使用 CLI：<code class="font-mono text-amber-550 bg-obsidian-800 px-1.5 py-0.5 rounded">asc guard enable/disable/unbind</code></p>
            </div>
          </div>
        </template>
        <template x-if="!guard">
          <div class="flex items-center gap-2 text-sm text-red-400">
            <div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(248,113,113,0.4)]"></div>
            Guard 状态读取失败
          </div>
        </template>
      </div>
    </div>

    <!-- LLM Configuration -->
<div class="card"
     x-data="{
       configs: {},
       defaultName: null,
       activeName: null,
       editName: '',
       editBaseUrl: 'https://api.openai.com/v1',
       editApiKey: '',
       editModel: 'gpt-4o',
       showForm: false,
       saving: false,
       saved: false,
       loading: true,
       isEditing: false,
       saveError: '',
     }"
     x-init="
       fetch('/api/settings/llm')
         .then(r => r.json())
         .then(d => {
           configs = d.configs || {};
           defaultName = d.default;
           activeName = d.default || Object.keys(configs)[0] || '';
           loading = false;
         })
         .catch(() => { loading = false; })
     ">
  <div class="card-header flex items-center gap-2">
    <svg class="w-4 h-4 text-amber-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z"/></svg>
    <h2 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">LLM 翻译配置</h2>
    <button @click="showForm = true; isEditing = false; editName = ''; editBaseUrl = 'https://api.openai.com/v1'; editApiKey = ''; editModel = 'gpt-4o'"
            class="ml-auto text-xs btn-secondary py-1 px-2">+ 新增配置</button>
  </div>
  <div class="card-body space-y-4">

    <!-- Add/Edit Form -->
    <template x-if="showForm">
      <div class="space-y-3 p-3 border border-obsidian-600 rounded-lg bg-obsidian-800/30">
        <div class="flex items-center gap-2">
          <span class="text-xs text-amber-400" x-show="!editName">新增配置</span>
          <span class="text-xs text-amber-400" x-show="editName">编辑配置</span>
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">配置名称</label>
          <input type="text" x-model="editName" placeholder="例如: openai, claude"
                 class="field-input w-full text-xs" :disabled="isEditing">
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">Base URL</label>
          <input type="text" x-model="editBaseUrl" placeholder="https://api.openai.com/v1"
                 class="field-input w-full text-xs">
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">API Key</label>
          <input type="password" x-model="editApiKey" placeholder="sk-..." class="field-input w-full text-xs">
        </div>
        <div>
          <label class="text-xs text-obsidian-500 mb-1 block">Model</label>
          <input type="text" x-model="editModel" placeholder="gpt-4o" class="field-input w-full text-xs">
        </div>
        <template x-if="saveError">
          <div class="text-xs text-red-400 py-1" x-text="saveError"></div>
        </template>
        <div class="flex gap-2">
          <button @click="
            saving = true;
            saveError = '';
            const name = isEditing ? editName : (editName || ('config' + (Object.keys(configs).length + 1)));
            fetch('/api/settings/llm', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                name: name,
                base_url: editBaseUrl,
                api_key: editApiKey,
                model: editModel,
                set_default: true
              })
            })
            .then(r => r.json())
            .then(d => { if (d.error) throw new Error(d.error); return fetch('/api/settings/llm'); })
            .then(r => r.json())
            .then(d => {
              configs = d.configs || {};
              defaultName = d.default;
              activeName = d.default || Object.keys(configs)[0] || '';
              showForm = false;
              saved = true;
              setTimeout(() => { saved = false; saving = false; }, 2000);
            })
            .catch(err => {
                saving = false;
                if (err.message && err.message.includes('HTTP')) {
                    saveError = '保存失败：' + err.message;
                } else {
                    saveError = '保存失败，请重试';
                }
                console.error('LLM config save error:', err);
            })
          " :disabled="saving" class="btn-primary text-xs px-3 py-1.5">
            <span x-show="!saving">保存</span>
            <span x-show="saving">保存中...</span>
          </button>
          <button @click="showForm = false" class="btn-secondary text-xs px-3 py-1.5">取消</button>
        </div>
      </div>
    </template>

    <!-- Config List -->
    <template x-if="!loading && Object.keys(configs).length === 0">
      <div class="text-sm text-obsidian-500 py-2">暂无配置，请点击「新增配置」添加</div>
    </template>
    <template x-if="!loading && Object.keys(configs).length > 0">
      <div class="space-y-2">
        <template x-for="(cfg, name) in configs" :key="name">
          <div class="flex items-center gap-3 p-2 rounded-lg border"
               :class="name === activeName ? 'border-amber-500/50 bg-amber-500/5' : 'border-obsidian-700'">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-xs font-medium" :class="name === activeName ? 'text-amber-400' : 'text-obsidian-300'"
                      x-text="name"></span>
                <span x-show="name === defaultName" class="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-400">默认</span>
              </div>
              <div class="text-[10px] text-obsidian-500 truncate" x-text="cfg.base_url + ' / ' + cfg.model"></div>
            </div>
            <div class="flex gap-1">
              <button @click="
                fetch('/api/settings/llm/default', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({name})
                }).then(() => {
                  defaultName = name;
                  activeName = name;
                })"
                      x-show="name !== defaultName"
                      class="text-[10px] btn-secondary py-1 px-2">设为默认</button>
              <button @click="
                isEditing = true;
                editName = name;
                editBaseUrl = cfg.base_url;
                editApiKey = cfg.api_key || '';
                editModel = cfg.model;
                showForm = true"
                      class="text-[10px] btn-secondary py-1 px-2">编辑</button>
              <button @click="
                fetch('/api/settings/llm?name=' + encodeURIComponent(name), {method: 'DELETE'})
                  .then(() => fetch('/api/settings/llm'))
                  .then(r => r.json())
                  .then(d => {
                    configs = d.configs || {};
                    defaultName = d.default;
                    activeName = d.default || Object.keys(configs)[0] || '';
                  })"
                      class="text-[10px] px-2 py-1 rounded border border-red-500/30 text-red-400 hover:bg-red-500/10">删除</button>
            </div>
          </div>
        </template>
      </div>
    </template>

    <template x-if="saved">
      <div class="text-xs text-emerald-400">已保存</div>
    </template>
  </div>
</div>

    <!-- Language -->
    <div class="card">
      <div class="card-header">
        <h2 class="text-xs uppercase tracking-widest text-obsidian-400 font-medium">语言</h2>
      </div>
      <div class="card-body">
        <select class="field-select"
                hx-post="/api/settings/lang"
                hx-trigger="change"
                hx-include="this"
                name="lang">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
  </div>
</div>
{% endblock %}
